<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗數 · Zi Wei Dou Shu</title>
<script src="https://cdn.jsdelivr.net/npm/iztro@2.5.8/dist/iztro.min.js"></script>
<style>
  :root {
    --bg-1: #0f0a2e;
    --bg-2: #1d1450;
    --bg-3: #3a1066;
    --gold: #d4af37;
    --gold-dim: #8a7028;
    --ivory: #f5e9c8;
    --text: #ece4d3;
    --text-dim: #b3a98c;
    --major: #f5e9c8;
    --soft: #6aacd9;
    --tough: #e77878;
    --lucun: #f0c552;
    --tianma: #5dd6d6;
    --flower: #f08fbf;
    --adj: #8a8278;
    --soul-glow: rgba(212,175,55,0.5);
    --decadal-glow: rgba(180,120,220,0.6);
    --yearly-glow: rgba(100,200,220,0.6);
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif TC', 'Noto Serif SC', 'Cormorant Garamond', Georgia, serif;
    background: radial-gradient(ellipse at top, var(--bg-3) 0%, var(--bg-2) 40%, var(--bg-1) 100%);
    min-height: 100vh; color: var(--text); padding: 24px 16px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 90% 50%, rgba(255,255,255,0.4), transparent);
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: clamp(28px, 5vw, 44px); color: var(--gold); letter-spacing: 0.08em; text-shadow: 0 2px 12px rgba(212,175,55,0.3); }
  h1 .deco { color: var(--text-dim); font-size: 0.7em; margin: 0 8px; }
  .lang-switch { display: flex; gap: 4px; background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim); border-radius: 999px; padding: 4px; }
  .lang-switch button {
    background: transparent; color: var(--text-dim); border: none;
    padding: 6px 14px; border-radius: 999px; cursor: pointer;
    font-size: 13px; font-family: inherit; transition: all 0.2s;
  }
  .lang-switch button.active { background: var(--gold); color: var(--bg-1); font-weight: 600; }
  .lang-switch button:hover:not(.active) { color: var(--ivory); }

  .intro { text-align: center; margin-bottom: 24px; color: var(--text-dim); font-style: italic; font-size: 15px; line-height: 1.7; }
  .intro p { max-width: 680px; margin: 0 auto; }

  .form-card {
    background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim);
    border-radius: 16px; padding: 24px; margin-bottom: 32px;
  }
  .section-label { color: var(--gold); font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; }
  .form-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 16px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { color: var(--text-dim); font-size: 13px; }
  .field input, .field select {
    background: rgba(0,0,0,0.4); border: 1px solid var(--gold-dim);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: inherit; font-size: 15px;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--gold); }
  .radio-row { display: flex; gap: 10px; }
  .radio-row label {
    flex: 1; cursor: pointer;
    background: rgba(0,0,0,0.4); border: 1px solid var(--gold-dim);
    border-radius: 8px; padding: 10px; text-align: center; color: var(--text);
    transition: all 0.2s;
  }
  .radio-row label.active { background: rgba(212,175,55,0.18); border-color: var(--gold); color: var(--gold); }
  .radio-row input { display: none; }

  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .btn {
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    color: var(--bg-1); border: none; border-radius: 8px;
    padding: 12px 28px; font-family: inherit; font-size: 15px; font-weight: 600;
    letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(212,175,55,0.3);
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(212,175,55,0.4); }
  .btn.ghost { background: transparent; color: var(--gold); border: 1px solid var(--gold); box-shadow: none; }
  .btn.ghost:hover:not(:disabled) { background: rgba(212,175,55,0.1); }

  .result { display: none; }
  .result.show { display: block; animation: fadeUp 0.5s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .summary {
    background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }
  .summary .si { display: flex; flex-direction: column; gap: 2px; }
  .summary .si .lab { color: var(--gold); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .summary .si .val { color: var(--ivory); font-size: 14px; font-weight: 500; }
  .summary .si .val .small { color: var(--text-dim); font-size: 12px; margin-left: 4px; font-weight: 400; }

  .chart-wrap {
    background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim);
    border-radius: 16px; padding: 14px; margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .chart {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, minmax(150px, 1fr));
    gap: 6px;
    aspect-ratio: 1.05 / 1;
    max-width: 1100px;
    margin: 0 auto;
  }
  @media (max-width: 720px) {
    .chart { grid-template-rows: repeat(4, minmax(110px, 1fr)); aspect-ratio: 0.85 / 1; }
  }
  .palace {
    background: linear-gradient(160deg, rgba(74,26,110,0.25) 0%, rgba(26,19,64,0.45) 100%);
    border: 1px solid rgba(212,175,55,0.25); border-radius: 8px;
    padding: 6px 6px 22px;
    position: relative; cursor: pointer; transition: all 0.2s;
    overflow: hidden; min-height: 0;
    font-size: 12px; line-height: 1.4;
  }
  .palace:hover { border-color: var(--gold); transform: translateY(-1px); }
  .palace.soul { border-color: var(--gold); box-shadow: 0 0 12px var(--soul-glow); }
  .palace.body::after {
    content: '身'; position: absolute; top: 4px; right: 4px;
    background: var(--gold); color: var(--bg-1); font-weight: 700;
    padding: 0 5px; border-radius: 3px; font-size: 10px;
  }
  .palace.decadal { box-shadow: 0 0 0 2px var(--decadal-glow), 0 0 14px var(--decadal-glow); }
  .palace.yearly { outline: 2px dashed var(--tianma); outline-offset: -3px; }
  .palace.selected { background: linear-gradient(160deg, rgba(212,175,55,0.18) 0%, rgba(74,26,110,0.4) 100%); border-color: var(--gold); }
  .palace.related { background: linear-gradient(160deg, rgba(106,172,217,0.12) 0%, rgba(26,19,64,0.4) 100%); border-color: var(--soft); }

  .palace .stars {
    display: flex; flex-wrap: wrap; gap: 2px 6px;
    margin-top: 4px;
  }
  .palace .star {
    display: inline-flex; align-items: baseline; gap: 1px;
    white-space: nowrap;
  }
  .palace .star.major { color: var(--major); font-weight: 700; font-size: 14px; }
  .palace .star.soft { color: var(--soft); }
  .palace .star.tough { color: var(--tough); }
  .palace .star.lucun { color: var(--lucun); font-weight: 600; }
  .palace .star.tianma { color: var(--tianma); }
  .palace .star.flower { color: var(--flower); }
  .palace .star.helper { color: var(--text); }
  .palace .star.adj { color: var(--adj); font-size: 11px; }
  .palace .br { color: var(--text-dim); font-size: 9px; margin-left: 1px; }
  .palace .mut {
    display: inline-block; padding: 0 3px; margin-left: 2px;
    border-radius: 3px; font-size: 9px; font-weight: 700; vertical-align: middle;
  }
  .palace .mut.lu { background: #2f7a4f; color: #fff; }
  .palace .mut.quan { background: #2d557a; color: #fff; }
  .palace .mut.ke { background: #8a6438; color: #fff; }
  .palace .mut.ji { background: #a13838; color: #fff; }

  .palace .footer {
    position: absolute; bottom: 4px; left: 6px; right: 6px;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text-dim); font-size: 10px;
    border-top: 1px solid rgba(212,175,55,0.15);
    padding-top: 3px;
  }
  .palace .footer .hsb { color: var(--gold); font-weight: 600; }
  .palace .footer .pname { color: var(--ivory); font-weight: 600; font-size: 11px; }

  .palace .ages {
    color: var(--text-dim); font-size: 9px; margin-top: 2px;
    line-height: 1.2;
  }

  .center {
    grid-column: 2 / 4; grid-row: 2 / 4;
    background: linear-gradient(160deg, rgba(74,26,110,0.4) 0%, rgba(26,19,64,0.7) 100%);
    border: 1px solid var(--gold-dim); border-radius: 8px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 6px;
    overflow: auto;
    color: var(--text);
  }
  .center .name { color: var(--gold); font-size: 16px; letter-spacing: 0.08em; }
  .center .row { display: flex; justify-content: space-between; font-size: 13px; gap: 8px; }
  .center .row .lab { color: var(--text-dim); }
  .center .row .val { color: var(--ivory); font-weight: 500; }
  .center .selection {
    margin-top: 4px; padding-top: 8px;
    border-top: 1px solid rgba(212,175,55,0.2);
    font-size: 12px; color: var(--text-dim);
  }
  .center .selection b { color: var(--ivory); font-weight: 600; }
  .center .selection .hint { color: var(--text-dim); font-style: italic; font-size: 11px; }

  .legend {
    background: rgba(0,0,0,0.25); border: 1px solid rgba(212,175,55,0.2);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
    display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--text-dim); }
  .legend-item .sw { width: 14px; height: 14px; border-radius: 3px; display: inline-block; border: 1px solid rgba(212,175,55,0.3); }
  .legend-item .sw.soul { background: rgba(212,175,55,0.4); border-color: var(--gold); }
  .legend-item .sw.decadal { box-shadow: 0 0 0 2px var(--decadal-glow); background: rgba(180,120,220,0.2); }
  .legend-item .sw.yearly { outline: 2px dashed var(--tianma); outline-offset: -3px; background: rgba(93,214,214,0.1); }
  .legend-item .sw.related { background: rgba(106,172,217,0.2); border-color: var(--soft); }
  .legend-item .sw.major { background: var(--major); }
  .legend-item .sw.soft { background: var(--soft); }
  .legend-item .sw.tough { background: var(--tough); }
  .legend-item .sw.flower { background: var(--flower); }

  .ana-panel {
    background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  .ana-panel-title { color: var(--gold); font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 14px; }

  .soul-profile { display: flex; flex-direction: column; gap: 16px; }
  .soul-card {
    background: rgba(212,175,55,0.06); border: 1px solid rgba(212,175,55,0.25);
    border-radius: 10px; padding: 14px 16px;
  }
  .soul-card .star-name { color: var(--gold); font-size: 18px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.05em; }
  .soul-card .star-name .br { font-size: 12px; color: var(--text-dim); margin-left: 6px; font-weight: 400; }
  .soul-card .star-nature { color: var(--ivory); font-size: 14px; margin-bottom: 10px; font-style: italic; }
  .soul-card .star-sect { margin-top: 10px; }
  .soul-card .star-sect .lab { color: var(--gold); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .soul-card .star-sect .txt { color: var(--text); font-size: 13px; line-height: 1.7; }
  .soul-card.empty .star-name { color: var(--text-dim); }
  .soul-card.empty .star-sect .txt { color: var(--text-dim); font-style: italic; }

  .palace-walk { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
  .pw-card {
    background: rgba(0,0,0,0.25); border: 1px solid rgba(212,175,55,0.2);
    border-radius: 10px; padding: 12px 14px;
  }
  .pw-card .pw-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .pw-card .pw-name { color: var(--gold); font-size: 14px; font-weight: 700; letter-spacing: 0.05em; }
  .pw-card .pw-eb { color: var(--text-dim); font-size: 11px; }
  .pw-card .pw-theme { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; font-style: italic; line-height: 1.5; }
  .pw-card .pw-stars { margin: 6px 0; }
  .pw-card .pw-stars .s {
    display: inline-block; padding: 2px 7px; margin: 1px 3px 1px 0;
    background: rgba(245,233,200,0.08); border: 1px solid rgba(245,233,200,0.2);
    border-radius: 4px; color: var(--ivory); font-size: 12px; font-weight: 600;
  }
  .pw-card .pw-stars .s.empty { background: none; border: 1px dashed rgba(212,175,55,0.15); color: var(--text-dim); font-style: italic; font-weight: 400; }
  .pw-card .pw-narr { color: var(--text); font-size: 13px; line-height: 1.7; margin-top: 4px; }

  .horo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 720px) { .horo-grid { grid-template-columns: 1fr; } }
  .horo-card {
    background: rgba(0,0,0,0.25); border: 1px solid rgba(212,175,55,0.25);
    border-radius: 10px; padding: 14px 16px;
  }
  .horo-card.decadal { border-color: rgba(180,120,220,0.5); }
  .horo-card.yearly { border-color: rgba(100,200,220,0.5); }
  .horo-card .hc-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .horo-card .hc-lab { color: var(--gold); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
  .horo-card .hc-meta { color: var(--text-dim); font-size: 11px; }
  .horo-card .hc-headline { color: var(--ivory); font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .horo-card .hc-body { color: var(--text); font-size: 13px; line-height: 1.7; }
  .horo-card .hc-mut { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(212,175,55,0.15); color: var(--text-dim); font-size: 12px; line-height: 1.6; }
  .horo-card .hc-mut b { color: var(--ivory); }
  .horo-card .hc-mut .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; margin: 0 2px; font-size: 11px; font-weight: 700; color: #fff; }
  .horo-card .hc-mut .tag.lu { background: #2f7a4f; }
  .horo-card .hc-mut .tag.quan { background: #2d557a; }
  .horo-card .hc-mut .tag.ke { background: #8a6438; }
  .horo-card .hc-mut .tag.ji { background: #a13838; }

  .patterns { display: flex; flex-direction: column; gap: 10px; }
  .pat-card {
    background: rgba(0,0,0,0.25); border: 1px solid rgba(212,175,55,0.25);
    border-radius: 10px; padding: 12px 14px;
  }
  .pat-card .pat-name { color: var(--gold); font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .pat-card .pat-name .badge { display: inline-block; padding: 1px 7px; margin-left: 6px; border-radius: 999px; font-size: 10px; font-weight: 700; vertical-align: middle; }
  .pat-card .pat-name .badge.good { background: rgba(74,155,110,0.2); color: #5fbf8a; border: 1px solid #5fbf8a; }
  .pat-card .pat-name .badge.neutral { background: rgba(212,175,55,0.15); color: var(--gold); border: 1px solid var(--gold-dim); }
  .pat-card .pat-name .badge.warn { background: rgba(231,120,120,0.15); color: var(--tough); border: 1px solid var(--tough); }
  .pat-card .pat-body { color: var(--text); font-size: 13px; line-height: 1.7; }
  .pat-card .pat-where { color: var(--text-dim); font-size: 11px; margin-top: 4px; }
  .pat-empty { color: var(--text-dim); font-style: italic; font-size: 13px; }

  footer { text-align: center; margin-top: 40px; color: var(--text-dim); font-size: 13px; }
  .error { color: var(--tough); background: rgba(231,120,120,0.1); border: 1px solid var(--tough); padding: 12px; border-radius: 8px; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <a href="../../index.html" style="display:inline-block;color:var(--gold-dim);text-decoration:none;font-size:13px;letter-spacing:0.1em;margin-bottom:12px;transition:color 0.15s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--gold-dim)'">← 命運閣 · Fatism</a>
  <header>
    <h1>✦ <span data-i18n="title">紫微斗數</span> <span class="deco">·</span> <span style="font-size:0.6em;color:var(--text-dim)">Zi Wei</span></h1>
    <div class="lang-switch" id="langSwitch">
      <button data-lang="tw" class="active">繁中</button>
      <button data-lang="cn">简中</button>
      <button data-lang="en">EN</button>
    </div>
  </header>

  <div class="intro">
    <p data-i18n="intro">紫微斗數以十四主星配十二宮位，演繹一生命運格局。輸入正確的出生時間，看見你的星盤。</p>
  </div>

  <div class="form-card">
    <div class="section-label" data-i18n="birthInfo">出生資訊</div>
    <div class="form-grid">
      <div class="field">
        <label data-i18n="calendarType">曆法</label>
        <div class="radio-row" data-group="cal">
          <label class="active" data-val="solar"><input type="radio" name="cal" value="solar" checked><span data-i18n="solar">公曆</span></label>
          <label data-val="lunar"><input type="radio" name="cal" value="lunar"><span data-i18n="lunar">農曆</span></label>
        </div>
      </div>
      <div class="field">
        <label data-i18n="gender">性別</label>
        <div class="radio-row" data-group="g">
          <label class="active" data-val="male"><input type="radio" name="g" value="male" checked><span data-i18n="male">男</span></label>
          <label data-val="female"><input type="radio" name="g" value="female"><span data-i18n="female">女</span></label>
        </div>
      </div>
    </div>
    <div class="form-grid">
      <div class="field"><label data-i18n="year">年</label><input id="y" type="number" min="1900" max="2100" value="1990"></div>
      <div class="field"><label data-i18n="month">月</label><input id="m" type="number" min="1" max="12" value="6"></div>
      <div class="field"><label data-i18n="day">日</label><input id="d" type="number" min="1" max="31" value="15"></div>
      <div class="field">
        <label data-i18n="hourSlot">時辰</label>
        <select id="hi"></select>
      </div>
      <div class="field" id="leapField" style="display:none;">
        <label data-i18n="leapMonth">閏月</label>
        <div class="radio-row" data-group="leap">
          <label class="active" data-val="0"><input type="radio" name="leap" value="0" checked><span data-i18n="no">否</span></label>
          <label data-val="1"><input type="radio" name="leap" value="1"><span data-i18n="yes">是</span></label>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn" id="calcBtn" data-i18n="calcBtn">排盤</button>
      <button class="btn ghost" id="resetBtn" data-i18n="resetBtn">重來</button>
    </div>
    <div class="error" id="err" style="display:none;"></div>
  </div>

  <div class="result" id="result">
    <div class="summary" id="summary"></div>

    <div class="legend">
      <div class="legend-item"><span class="sw soul"></span><span data-i18n="legSoul">命宮</span></div>
      <div class="legend-item"><span class="sw" style="background:var(--gold);color:var(--bg-1);text-align:center;font-size:9px;line-height:14px;font-weight:700;">身</span><span data-i18n="legBody">身宮</span></div>
      <div class="legend-item"><span class="sw decadal"></span><span data-i18n="legDecadal">大限</span></div>
      <div class="legend-item"><span class="sw yearly"></span><span data-i18n="legYearly">流年</span></div>

function hasStar(palace, starName) {
  return (palace.majorStars || []).some(s => s.name === starName);
}
function countSurroundingStars(palace, all, names) {
  const idx = palace._idx;
  const surrounding = [all[(idx + 4) % 12], all[(idx + 8) % 12], all[(idx + 6) % 12]];
  let n = 0;
  surrounding.forEach(p => {
    const ms = (p.majorStars || []).concat(p.minorStars || []);
    ms.forEach(s => { if (names.includes(s.name)) n++; });
  });
  return n;
}

function trStar(name) {
  if (STAR_T[name]) return STAR_T[name][state.lang];
  return name;
}
function trPalace(name) {
  if (PALACE_T[name]) return PALACE_T[name][state.lang];
  return name;
}
function trMutagen(name) {
  if (MUTAGEN_T[name]) return MUTAGEN_T[name][state.lang];
  return name;
}

let state = { lang: 'tw', input: null, astro: null, selectedIdx: null };

function t(k) { return I18N[state.lang][k] || k; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (I18N[state.lang][k] != null) el.textContent = I18N[state.lang][k];
  });
  document.documentElement.lang = ({tw:'zh-TW',cn:'zh-CN',en:'en'})[state.lang];
  const hi = document.getElementById('hi');
  const cur = hi.value || '6';
  hi.innerHTML = I18N[state.lang].hourSlots.map((s, i) => `<option value="${i}">${s}</option>`).join('');
  hi.value = cur;
  if (state.input) calculate();
}

function initHourSlot() {
  const hi = document.getElementById('hi');
  hi.innerHTML = I18N.tw.hourSlots.map((s, i) => `<option value="${i}">${s}</option>`).join('');
  hi.value = '6';
}

document.getElementById('langSwitch').addEventListener('click', (e) => {
  if (e.target.tagName !== 'BUTTON') return;
  state.lang = e.target.dataset.lang;
  document.querySelectorAll('#langSwitch button').forEach(b => b.classList.toggle('active', b.dataset.lang === state.lang));
  applyI18n();
});

document.querySelectorAll('.radio-row').forEach(row => {
  row.addEventListener('click', (e) => {
    const label = e.target.closest('label');
    if (!label) return;
    row.querySelectorAll('label').forEach(l => l.classList.remove('active'));
    label.classList.add('active');
    label.querySelector('input').checked = true;
    if (row.dataset.group === 'cal') {
      document.getElementById('leapField').style.display = label.dataset.val === 'lunar' ? 'flex' : 'none';
    }
  });
});

function getInput() {
  return {
    cal: document.querySelector('input[name=cal]:checked').value,
    g: document.querySelector('input[name=g]:checked').value,
    y: +document.getElementById('y').value,
    m: +document.getElementById('m').value,
    d: +document.getElementById('d').value,
    hi: +document.getElementById('hi').value,
    leap: +(document.querySelector('input[name=leap]:checked')?.value || 0) === 1,
  };
}

function showError(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = 'block';
}
function clearError() { document.getElementById('err').style.display = 'none'; }

function calculate() {
  clearError();
  if (typeof iztro === 'undefined' || !iztro.astro) {
    showError(t('errLib')); return;
  }
  const i = getInput();
  state.input = i;
  state.selectedIdx = null;
  try {
    let astro;
    if (i.cal === 'solar') {
      const dateStr = `${i.y}-${i.m}-${i.d}`;
      astro = iztro.astro.astrolabeBySolarDate(dateStr, i.hi, i.g, true, 'zh-TW');
    } else {
      const dateStr = `${i.y}-${i.m}-${i.d}`;
      astro = iztro.astro.astrolabeByLunarDate(dateStr, i.hi, i.g, i.leap, true, 'zh-TW');
    }
    astro.palaces.forEach((p, idx) => { p._idx = idx; });
    state.astro = astro;
    render();
  } catch (e) {
    showError(t('errInvalidDate') + ' ' + e.message);
  }
}

function render() {
  const a = state.astro;
  if (!a) return;
  document.getElementById('result').classList.add('show');

  const todayStr = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  })();
  let horo = null;
  try { horo = a.horoscope(todayStr); } catch (e) { horo = null; }

  renderSummary(a, horo);
  renderChart(a, horo);
  renderSoulAnalysis(a);
  renderPalaceWalk(a);
  renderHoroAnalysis(a, horo);
  renderPatterns(a);
}

function renderSummary(a, horo) {
  const items = [
    { lab: t('sumSolar'), val: a.solarDate + ' <span class="small">' + (a.time || '') + '</span>' },
    { lab: t('sumLunar'), val: a.lunarDate },
    { lab: t('sumChinese'), val: a.chineseDate },
    { lab: t('sumSoul') + ' / ' + t('sumBody'), val: `${trStar(a.soul)} / ${trStar(a.body)}` },
    { lab: t('sumFive'), val: a.fiveElementsClass },
    { lab: t('sumSign') + ' / ' + t('sumZodiac'), val: `${a.sign} · ${a.zodiac}` },
  ];
  if (horo) {
    items.push({ lab: t('sumDecadal'), val: `${horo.decadal.heavenlyStem}${horo.decadal.earthlyBranch}` });
    items.push({ lab: t('sumYearly'), val: `${horo.yearly.heavenlyStem}${horo.yearly.earthlyBranch}` });
  }
  document.getElementById('summary').innerHTML = items.map(x => `
    <div class="si"><div class="lab">${x.lab}</div><div class="val">${x.val}</div></div>
  `).join('');
}

function relatedIndices(idx) {
  const opp = (idx + 6) % 12;
  const tri1 = (idx + 4) % 12;
  const tri2 = (idx + 8) % 12;
  return new Set([opp, tri1, tri2]);
}

function renderChart(a, horo) {
  const chartEl = document.getElementById('chart');
  chartEl.innerHTML = '';
  const decadalIdx = horo ? horo.decadal.index : -1;
  const yearlyIdx = horo ? horo.yearly.index : -1;
  const related = state.selectedIdx != null ? relatedIndices(state.selectedIdx) : null;

  a.palaces.forEach((p, i) => {
    const pos = GRID_POS[i];
    if (!pos) return;
    const isSoul = (p.name === '命宮' || p.name === '命宫' || p.name === 'soul');
    const classes = ['palace'];
    if (isSoul) classes.push('soul');
    if (p.isBodyPalace) classes.push('body');
    if (i === decadalIdx) classes.push('decadal');
    if (i === yearlyIdx) classes.push('yearly');
    if (state.selectedIdx === i) classes.push('selected');
    else if (related && related.has(i)) classes.push('related');

    const majorHtml = (p.majorStars || []).map(s => starHtml(s, 'major')).join('');
    const minorHtml = (p.minorStars || []).map(s => starHtml(s, s.type || 'soft')).join('');
    const adjHtml = (p.adjectiveStars || []).slice(0, 6).map(s => starHtml(s, s.type === 'flower' ? 'flower' : 'adj')).join('');
    const decRange = p.decadal ? `${p.decadal.range[0]}-${p.decadal.range[1]}` : '';
    const ages = (p.ages || []).slice(0, 5).join('·');

    chartEl.insertAdjacentHTML('beforeend', `
      <div class="palace ${classes.join(' ')}" style="grid-column:${pos.col};grid-row:${pos.row};" data-idx="${i}">
        <div class="stars">${majorHtml}${minorHtml}${adjHtml}</div>
        <div class="ages">${decRange ? decRange + t('ageRange') + ' · ' : ''}${ages}</div>
        <div class="footer">
          <span class="hsb">${p.heavenlyStem}${p.earthlyBranch}</span>
          <span class="pname">${trPalace(p.name)}</span>
        </div>
      </div>`);
  });

  const center = document.createElement('div');
  center.className = 'center';
  let centerHtml = `
    <div class="name">✦ ${t('title')}</div>
    <div class="row"><span class="lab">${t('sumChinese')}</span><span class="val">${a.chineseDate}</span></div>
    <div class="row"><span class="lab">${t('sumSoul')}</span><span class="val">${trStar(a.soul)} · ${trStar(a.body)}</span></div>
    <div class="row"><span class="lab">${t('sumFive')}</span><span class="val">${a.fiveElementsClass}</span></div>
    <div class="row"><span class="lab">${t('sumSign')}</span><span class="val">${a.sign} · ${a.zodiac}</span></div>
    <div class="row"><span class="lab">${t('sumGender')}</span><span class="val">${a.gender}</span></div>`;
  if (horo) {
    centerHtml += `
      <div class="row"><span class="lab">${t('sumDecadal')}</span><span class="val">${horo.decadal.heavenlyStem}${horo.decadal.earthlyBranch}</span></div>
      <div class="row"><span class="lab">${t('sumYearly')}</span><span class="val">${horo.yearly.heavenlyStem}${horo.yearly.earthlyBranch}</span></div>`;
  }
  const sel = state.selectedIdx;
  if (sel != null) {
    const sp = a.palaces[sel];
    centerHtml += `<div class="selection">${t('selectedTpl').replace('{name}', trPalace(sp.name)).replace('{eb}', sp.heavenlyStem + sp.earthlyBranch)}</div>`;
  } else {
    centerHtml += `<div class="selection hint">${t('selectHint')}</div>`;
  }
  center.innerHTML = centerHtml;
  center.style.gridColumn = '2 / 4';
  center.style.gridRow = '2 / 4';
  chartEl.appendChild(center);

  chartEl.querySelectorAll('.palace').forEach(el => {
    el.addEventListener('click', () => {
      const idx = +el.dataset.idx;
      state.selectedIdx = state.selectedIdx === idx ? null : idx;
      render();
    });
  });
}

function renderSoulAnalysis(a) {
  const el = document.getElementById('anaSoul');
  if (!el) return;
  const soulPal = a.palaces.find(p => p.name === '命宮');

    cards.push(`
      <div class="soul-card empty">

        <div class="star-sect"><span class="txt">${t('soulEmptyBody')}</span></div>

      cards.push(`
        <div class="soul-card">
          <div class="star-name">${trStar(s.name)}${br}</div>
          <div class="star-nature">${prof.nature[lang]}</div>

          <div class="star-sect"><span class="lab">${t('secBlindspot')}</span><span class="txt">${prof.blindspot[lang]}</span></div>

        </div>`);
    });
  } else {
    majors.forEach(s => {

      const mt = s.mutagen;
      const mutClass = mt && MUTAGEN_CLASS[mt];

      const mutHtml = (mt && mutClass) ? ` <span class="mut ${mutClass}">${mutLabel}</span>` : '';
      cards.push(`
        <div class="soul-card">
          <div class="star-name">${trStar(s.name)}${br}${mutHtml}</div>

const PALACE_ORDER = ['命宮','兄弟','夫妻','子女','財帛','疾厄','遷移','僕役','官祿','田宅','福德','父母'];

function renderPalaceWalk(a) {
  const el = document.getElementById('anaWalk');
  if (!el) return;
  const lang = state.lang;
  const html = PALACE_ORDER.map(pname => {
    const p = a.palaces.find(q => q.name === pname);
    if (!p) return '';
    const theme = (PALACE_THEME_DESC[pname] || {})[lang] || '';
    const majors = p.majorStars || [];
    let starsHtml, narr;
    if (majors.length === 0) {
      starsHtml = `<span class="s empty">${t('palaceEmpty')}</span>`;
      narr = theme;
    } else {
      starsHtml = majors.map(s => {
        const br = s.brightness ? `<span class="br">${s.brightness}</span>` : '';
        return `<span class="s">${trStar(s.name)}${br}</span>`;
      }).join(' ');
      const sep = lang === 'en' ? '; ' : '、';
      const kwList = majors.map(s => (STAR_KEYWORDS[s.name] || { [lang]: s.name })[lang]).join(sep);
      const hint = (PALACE_STAR_HINT[pname] || { [lang]: '' })[lang].replace('{kw}', kwList);
      narr = `${theme} ${hint}`;
    }
    return `
      <div class="pw-card">
        <div class="pw-head">
          <span class="pw-name">${trPalace(pname)}</span>
          <span class="pw-eb">${p.heavenlyStem}${p.earthlyBranch}</span>
        </div>
        <div class="pw-stars">${starsHtml}</div>
        <div class="pw-narr">${narr}</div>
      </div>`;
  }).join('');
  el.innerHTML = html;
}

function renderHoroAnalysis(a, horo) {
  const el = document.getElementById('anaHoro');
  if (!el) return;
  if (!horo) { el.innerHTML = ''; return; }
  const lang = state.lang;
  const cards = [];

  const buildCard = (kind, info) => {
    const pal = a.palaces[info.index];
    if (!pal) return '';
    const palName = pal.name;
    const palDisp = trPalace(palName);
    const theme = (PALACE_THEME_DESC[palName] || { [lang]: '' })[lang];
    const majors = pal.majorStars || [];
    const starSep = lang === 'en' ? ', ' : '、';
    const starsList = majors.length
      ? majors.map(s => trStar(s.name)).join(starSep)
      : t('palaceEmpty');
    const tpl = kind === 'decadal' ? t('horoDecadeNarrTpl') : t('horoYearNarrTpl');
    const meta = kind === 'yearly' ? t('yearlyYearLab').replace('{year}', new Date().getFullYear()) : '';
    const headline = tpl
      .replace('{palace}', palDisp)
      .replace('{stars}', starsList)
      .replace('{theme}', theme)
      .replace('{year}', new Date().getFullYear());
    const muts = info.mutagen || [];
    const tagFor = (n) => {
      const labels = ['lu','quan','ke','ji'];
      const names = MUTAGEN_LABEL;
      const code = ['祿','權','科','忌'][n];
      return `<span class="tag ${labels[n]}">${(MUTAGEN_T[code] || { [lang]: code })[lang]}</span>`;
    };
    let mutHtml = '';
    if (muts.length) {
      const period = kind === 'decadal' ? t('decadalLab') : t('yearlyLab');
      const items = muts.map((star, i) => `${tagFor(i)} <b>${trStar(star)}</b>`).join('　');
      mutHtml = `<div class="hc-mut">${t('horoMutLab').replace('{period}', period)}： ${items}</div>`;
    }
    const stemBranch = `${info.heavenlyStem || ''}${info.earthlyBranch || ''}`;
    return `
      <div class="horo-card ${kind}">
        <div class="hc-head">
          <span class="hc-lab">${kind === 'decadal' ? t('decadalLab') : t('yearlyLab')} · ${stemBranch}</span>
          <span class="hc-meta">${meta}</span>
        </div>
        <div class="hc-headline">${headline}</div>
        ${mutHtml}
      </div>`;
  };

  cards.push(buildCard('decadal', horo.decadal));
  cards.push(buildCard('yearly', horo.yearly));
  el.innerHTML = cards.join('');
}

function renderPatterns(a) {
  const el = document.getElementById('anaPat');
  if (!el) return;
  const lang = state.lang;
  const soulPal = a.palaces.find(p => p.name === '命宮');
  if (!soulPal) { el.innerHTML = `<div class="pat-card"><div class="pat-body">${t('patEmpty')}</div></div>`; return; }
  const matched = PATTERNS.filter(pat => {
    try { return pat.check(soulPal, a.palaces); } catch (e) { return false; }
  });
  if (matched.length === 0) {
    el.innerHTML = `<div class="pat-card"><div class="pat-body">${t('patEmpty')}</div></div>`;
    return;
  }
  el.innerHTML = matched.map(pat => {
    const badgeLab = pat.badge === 'good' ? t('badgeGood') : pat.badge === 'warn' ? t('badgeWarn') : t('badgeNeutral');
    return `
      <div class="pat-card">
        <div class="pat-name">${pat.name[lang]}<span class="badge ${pat.badge}">${badgeLab}</span></div>
        <div class="pat-body">${pat.desc[lang]}</div>
      </div>`;
  }).join('');
}

function starHtml(s, klass) {
  const mt = s.mutagen;
  const mutClass = mt && MUTAGEN_CLASS[mt];
  const mutLabel = mt && MUTAGEN_LABEL[mt];
  const mutHtml = (mt && mutClass) ? `<span class="mut ${mutClass}">${mutLabel}</span>` : '';
  const br = s.brightness ? `<span class="br">${s.brightness}</span>` : '';
  const cls = ['star', klass].join(' ');
  return `<span class="${cls}">${s.name}${br}${mutHtml}</span>`;
}

function reset() {
  state.input = null;
  state.astro = null;
  state.selectedIdx = null;
  document.getElementById('result').classList.remove('show');
  clearError();
}

document.getElementById('calcBtn').addEventListener('click', calculate);
document.getElementById('resetBtn').addEventListener('click', reset);

initHourSlot();
applyI18n();
</script>
</body>
</html>
