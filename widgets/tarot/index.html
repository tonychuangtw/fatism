<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔羅占卜 · Tarot Reading</title>
<style>
  :root {
    --bg-1: #1a1340;
    --bg-2: #2d1b5e;
    --bg-3: #4a1a6e;
    --gold: #d4af37;
    --gold-dim: #8a7028;
    --ivory: #f5e9c8;
    --text: #ece4d3;
    --text-dim: #b3a98c;
    --card-back: linear-gradient(135deg, #1e0a4a 0%, #4a1a6e 50%, #1e0a4a 100%);
    --card-face: linear-gradient(160deg, #f8efd4 0%, #e8d8a8 100%);
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif TC', 'Noto Serif SC', 'Cormorant Garamond', Georgia, serif;
    background: radial-gradient(ellipse at top, var(--bg-3) 0%, var(--bg-2) 40%, var(--bg-1) 100%);
    min-height: 100vh;
    color: var(--text);
    padding: 24px 16px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 90% 50%, rgba(255,255,255,0.4), transparent);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  h1 {
    font-size: clamp(28px, 5vw, 44px);
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 2px 12px rgba(212,175,55,0.3);
  }
  h1 .deco { color: var(--text-dim); font-size: 0.7em; margin: 0 8px; }
  .lang-switch { display: flex; gap: 4px; background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim); border-radius: 999px; padding: 4px; }
  .lang-switch button {
    background: transparent; color: var(--text-dim); border: none;
    padding: 6px 14px; border-radius: 999px; cursor: pointer;
    font-size: 13px; font-family: inherit; transition: all 0.2s;
  }
  .lang-switch button.active { background: var(--gold); color: var(--bg-1); font-weight: 600; }
  .lang-switch button:hover:not(.active) { color: var(--ivory); }

  .intro { text-align: center; margin-bottom: 24px; color: var(--text-dim); font-style: italic; font-size: 15px; line-height: 1.7; }
  .intro p { max-width: 640px; margin: 0 auto; }

  .controls {
    background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim);
    border-radius: 16px; padding: 24px; margin-bottom: 32px;
  }
  .section-label { color: var(--gold); font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; }
  .spreads { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .spread-option {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.3);
    border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.2s;
    text-align: left;
  }
  .spread-option:hover { background: rgba(212,175,55,0.1); border-color: var(--gold); }
  .spread-option.selected { background: rgba(212,175,55,0.18); border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
  .spread-title { color: var(--ivory); font-weight: 600; margin-bottom: 4px; }
  .spread-desc { color: var(--text-dim); font-size: 13px; line-height: 1.4; }

  .question-box {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .question-box input {
    flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--gold-dim);
    border-radius: 8px; padding: 12px 14px; color: var(--text);
    font-family: inherit; font-size: 15px;
  }
  .question-box input:focus { outline: none; border-color: var(--gold); }
  .question-box input::placeholder { color: var(--text-dim); font-style: italic; }

  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn {
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    color: var(--bg-1); border: none; border-radius: 8px;
    padding: 12px 28px; font-family: inherit; font-size: 15px; font-weight: 600;
    letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(212,175,55,0.3);
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(212,175,55,0.4); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.ghost {
    background: transparent; color: var(--gold); border: 1px solid var(--gold);
    box-shadow: none;
  }
  .btn.ghost:hover:not(:disabled) { background: rgba(212,175,55,0.1); }

  .stage {
    min-height: 380px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; margin-bottom: 24px;
  }
  .deck-area {
    perspective: 1200px; display: flex; flex-wrap: wrap; gap: 18px;
    justify-content: center; align-items: flex-start; min-height: 320px;
  }
  .card-slot { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 150px; }
  .slot-label { color: var(--gold); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }
  .card {
    width: 140px; height: 220px; position: relative; transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.reversed.flipped { transform: rotateY(180deg) rotate(180deg); }
  .card-face, .card-back-face {
    position: absolute; inset: 0; border-radius: 10px;
    backface-visibility: hidden; box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 12px; text-align: center; border: 1px solid var(--gold-dim);
  }
  .card-back-face {
    background: var(--card-back);
    background-image:
      radial-gradient(circle at 50% 50%, rgba(212,175,55,0.15) 0%, transparent 60%),
      var(--card-back);
  }
  .card-back-face::before {
    content: '✦'; font-size: 64px; color: var(--gold); opacity: 0.5;
    text-shadow: 0 0 20px rgba(212,175,55,0.6);
  }
  .card-back-face::after {
    content: ''; position: absolute; inset: 6px; border: 1px solid rgba(212,175,55,0.4);
    border-radius: 6px; pointer-events: none;
  }
  .card-face {
    background: var(--card-face); color: #2d1b5e; transform: rotateY(180deg);
    background-image: linear-gradient(160deg, #f8efd4 0%, #e8d8a8 100%);
  }
  .card-face::after {
    content: ''; position: absolute; inset: 6px; border: 1px solid rgba(74,26,110,0.3);
    border-radius: 6px; pointer-events: none;
  }
  .card-icon { font-size: 48px; line-height: 1; margin-bottom: 8px; }
  .card-num { font-size: 11px; letter-spacing: 0.2em; color: var(--bg-2); opacity: 0.7; margin-bottom: 6px; font-weight: 700; }
  .card-name { font-size: 16px; font-weight: 700; color: var(--bg-1); line-height: 1.2; }

  .interpretations { margin-top: 32px; display: flex; flex-direction: column; gap: 16px; }
  .interp-card {
    background: rgba(0,0,0,0.35); border: 1px solid var(--gold-dim);
    border-radius: 12px; padding: 20px; opacity: 0; transform: translateY(10px);
    animation: fadeUp 0.5s forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .interp-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .interp-position { color: var(--gold); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; }
  .interp-orient { color: var(--text-dim); font-size: 12px; font-style: italic; }
  .interp-name { font-size: 20px; color: var(--ivory); font-weight: 700; margin-bottom: 6px; }
  .interp-keywords { color: var(--gold); font-size: 13px; margin-bottom: 10px; letter-spacing: 0.05em; }
  .interp-body { color: var(--text); line-height: 1.7; font-size: 15px; }

  .celtic-grid {
    display: grid;
    grid-template-columns: repeat(4, 150px);
    grid-template-rows: repeat(4, auto);
    gap: 14px;
    justify-content: center;
  }
  .celtic-grid .card-slot.pos-1 { grid-column: 2; grid-row: 2; }
  .celtic-grid .card-slot.pos-2 { grid-column: 2; grid-row: 2; z-index: 2; transform: translateX(50%) rotate(90deg); }
  .celtic-grid .card-slot.pos-3 { grid-column: 2; grid-row: 3; }
  .celtic-grid .card-slot.pos-4 { grid-column: 1; grid-row: 2; }
  .celtic-grid .card-slot.pos-5 { grid-column: 2; grid-row: 1; }
  .celtic-grid .card-slot.pos-6 { grid-column: 3; grid-row: 2; }
  .celtic-grid .card-slot.pos-7 { grid-column: 4; grid-row: 4; }
  .celtic-grid .card-slot.pos-8 { grid-column: 4; grid-row: 3; }
  .celtic-grid .card-slot.pos-9 { grid-column: 4; grid-row: 2; }
  .celtic-grid .card-slot.pos-10 { grid-column: 4; grid-row: 1; }

  @media (max-width: 720px) {
    .celtic-grid { grid-template-columns: repeat(2, 140px); grid-template-rows: auto; }
    .celtic-grid .card-slot { grid-column: auto !important; grid-row: auto !important; transform: none !important; }
  }
  footer { text-align: center; margin-top: 40px; color: var(--text-dim); font-size: 13px; }
</style>
</head>

let state = {
  lang: 'tw',
  spread: 'three',
  drawn: [],
  revealed: 0,
};

function t(key) { return I18N[state.lang][key] || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (I18N[state.lang][k]) el.textContent = I18N[state.lang][k];
  });
  document.getElementById('question').placeholder = t('questionPh');
  document.documentElement.lang = ({tw:'zh-TW',cn:'zh-CN',en:'en'})[state.lang];
  renderSpreads();
  if (state.drawn.length) renderStage();
  renderInterps();
}

function renderSpreads() {
  const el = document.getElementById('spreads');
  el.innerHTML = '';
  for (const [key, sp] of Object.entries(SPREADS)) {
    const div = document.createElement('div');
    div.className = 'spread-option' + (state.spread === key ? ' selected' : '');
    div.innerHTML = `<div class="spread-title">${sp.name[state.lang]}</div><div class="spread-desc">${sp.desc[state.lang]}</div>`;
    div.onclick = () => { state.spread = key; reset(); renderSpreads(); };
    el.appendChild(div);
  }
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function draw() {
  const sp = SPREADS[state.spread];
  const shuffled = shuffle(DECK);
  state.drawn = shuffled.slice(0, sp.count).map(card => ({
    card,
    reversed: Math.random() < 0.5,
  }));
  state.revealed = 0;
  renderStage();
  renderInterps();
}

function renderStage() {
  const sp = SPREADS[state.spread];
  const el = document.getElementById('deckArea');
  el.innerHTML = '';
  el.className = 'deck-area' + (state.spread === 'celtic' ? ' celtic-grid' : '');
  state.drawn.forEach((d, idx) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot' + (state.spread === 'celtic' ? ` pos-${idx+1}` : '');
    const label = document.createElement('div');
    label.className = 'slot-label';
    label.textContent = sp.positions[idx][state.lang];
    const card = document.createElement('div');
    card.className = 'card' + (d.reversed ? ' reversed' : '');
    if (idx < state.revealed) card.classList.add('flipped');
    card.innerHTML = `
      <div class="card-back-face"></div>
      <div class="card-face">
        <div class="card-icon">${d.card.icon}</div>
        <div class="card-num">${d.card.num}</div>
        <div class="card-name">${d.card.name[state.lang]}</div>
      </div>`;
    card.onclick = () => {
      if (idx === state.revealed) {
        state.revealed++;
        card.classList.add('flipped');
        renderInterps();
      }
    };
    slot.appendChild(label);
    slot.appendChild(card);
    el.appendChild(slot);
  });
}

function renderInterps() {
  const el = document.getElementById('interp');
  el.innerHTML = '';
  const sp = SPREADS[state.spread];
  state.drawn.slice(0, state.revealed).forEach((d, idx) => {
    const o = d.reversed ? d.card.rev : d.card.up;
    const div = document.createElement('div');
    div.className = 'interp-card';
    div.style.animationDelay = `${idx * 0.1}s`;
    div.innerHTML = `
      <div class="interp-head">
        <span class="interp-position">${sp.positions[idx][state.lang]}</span>
        <span class="interp-orient">${d.card.icon} ${d.card.name[state.lang]} · ${d.reversed ? t('reversed') : t('upright')}</span>
      </div>
      <div class="interp-name">${d.card.name[state.lang]}</div>
      <div class="interp-keywords">${o.kw[state.lang]}</div>
      <div class="interp-body">${o.body[state.lang]}</div>`;
    el.appendChild(div);
  });
}

function reset() {
  state.drawn = [];
  state.revealed = 0;
  document.getElementById('deckArea').innerHTML = '';
  document.getElementById('interp').innerHTML = '';
}

document.getElementById('langSwitch').addEventListener('click', (e) => {
  if (e.target.tagName !== 'BUTTON') return;
  state.lang = e.target.dataset.lang;
  document.querySelectorAll('#langSwitch button').forEach(b => b.classList.toggle('active', b.dataset.lang === state.lang));
  applyI18n();
});
document.getElementById('drawBtn').addEventListener('click', draw);
document.getElementById('resetBtn').addEventListener('click', () => { reset(); });

applyI18n();
</script>
</body>
</html>
