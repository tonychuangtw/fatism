<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命盤 · BaZi Chart</title>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.7/lunar.js"></script>
<style>
  :root {
    --bg-1: #1a1340;
    --bg-2: #2d1b5e;
    --bg-3: #4a1a6e;
    --gold: #d4af37;
    --gold-dim: #8a7028;
    --ivory: #f5e9c8;
    --text: #ece4d3;
    --text-dim: #b3a98c;
    --wood: #4a9b6e;
    --fire: #d65454;
    --earth: #c89853;
    --metal: #c0c0c8;
    --water: #4a7bb0;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif TC', 'Noto Serif SC', 'Cormorant Garamond', Georgia, serif;
    background: radial-gradient(ellipse at top, var(--bg-3) 0%, var(--bg-2) 40%, var(--bg-1) 100%);
    min-height: 100vh; color: var(--text); padding: 24px 16px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 90% 50%, rgba(255,255,255,0.4), transparent);
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: clamp(28px, 5vw, 44px); color: var(--gold); letter-spacing: 0.08em; text-shadow: 0 2px 12px rgba(212,175,55,0.3); }
  h1 .deco { color: var(--text-dim); font-size: 0.7em; margin: 0 8px; }
  .lang-switch { display: flex; gap: 4px; background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim); border-radius: 999px; padding: 4px; }
  .lang-switch button {
    background: transparent; color: var(--text-dim); border: none;
    padding: 6px 14px; border-radius: 999px; cursor: pointer;
    font-size: 13px; font-family: inherit; transition: all 0.2s;
  }
  .lang-switch button.active { background: var(--gold); color: var(--bg-1); font-weight: 600; }
  .lang-switch button:hover:not(.active) { color: var(--ivory); }

  .intro { text-align: center; margin-bottom: 24px; color: var(--text-dim); font-style: italic; font-size: 15px; line-height: 1.7; }
  .intro p { max-width: 640px; margin: 0 auto; }

  .form-card {
    background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim);
    border-radius: 16px; padding: 24px; margin-bottom: 32px;
  }
  .section-label { color: var(--gold); font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; }
  .form-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px; margin-bottom: 16px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { color: var(--text-dim); font-size: 13px; }
  .field input, .field select {
    background: rgba(0,0,0,0.4); border: 1px solid var(--gold-dim);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: inherit; font-size: 15px;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--gold); }
  .radio-row { display: flex; gap: 10px; }
  .radio-row label {
    flex: 1; cursor: pointer;
    background: rgba(0,0,0,0.4); border: 1px solid var(--gold-dim);
    border-radius: 8px; padding: 10px; text-align: center; color: var(--text);
    transition: all 0.2s;
  }
  .radio-row label.active { background: rgba(212,175,55,0.18); border-color: var(--gold); color: var(--gold); }
  .radio-row input { display: none; }

  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .btn {
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    color: var(--bg-1); border: none; border-radius: 8px;
    padding: 12px 28px; font-family: inherit; font-size: 15px; font-weight: 600;
    letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(212,175,55,0.3);
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(212,175,55,0.4); }
  .btn.ghost { background: transparent; color: var(--gold); border: 1px solid var(--gold); box-shadow: none; }
  .btn.ghost:hover:not(:disabled) { background: rgba(212,175,55,0.1); }

  .result { display: none; }
  .result.show { display: block; animation: fadeUp 0.5s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .summary {
    background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
    color: var(--text-dim); font-size: 14px; line-height: 1.7;
  }
  .summary b { color: var(--ivory); font-weight: 600; }

  .pillars {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px;
  }
  @media (max-width: 600px) { .pillars { grid-template-columns: repeat(2, 1fr); } }
  .pillar {
    background: linear-gradient(160deg, rgba(74,26,110,0.4) 0%, rgba(26,19,64,0.6) 100%);
    border: 1px solid var(--gold-dim); border-radius: 12px; padding: 18px 12px;
    text-align: center; box-shadow: var(--shadow);
  }
  .pillar-title { color: var(--gold); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 14px; }
  .pillar-chars { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .gan, .zhi { font-size: 36px; font-weight: 700; line-height: 1.2; color: var(--ivory); }
  .gan { padding: 6px 0; border-radius: 6px; }
  .zhi { padding: 6px 0; border-radius: 6px; }
  .wx-木 { color: var(--wood); }
  .wx-火 { color: var(--fire); }
  .wx-土 { color: var(--earth); }
  .wx-金 { color: var(--metal); }
  .wx-水 { color: var(--water); }
  .pillar-meta { color: var(--text-dim); font-size: 12px; line-height: 1.6; margin-top: 8px; padding-top: 10px; border-top: 1px solid rgba(212,175,55,0.2); }
  .pillar-meta div { margin: 2px 0; }
  .pillar-meta .label { color: var(--gold); margin-right: 4px; font-size: 11px; }
  .pillar-meta .shishen { color: var(--ivory); }

  .panel {
    background: rgba(0,0,0,0.3); border: 1px solid var(--gold-dim);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  .panel-title { color: var(--gold); font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }

  .wuxing-bars { display: flex; gap: 12px; align-items: flex-end; height: 140px; padding: 0 8px; }
  .wx-bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; }
  .wx-bar .bar-wrap { flex: 1; width: 100%; max-width: 60px; display: flex; align-items: flex-end; }
  .wx-bar .bar { width: 100%; border-radius: 6px 6px 0 0; transition: height 0.6s ease; min-height: 8px; }
  .wx-bar .bar.木 { background: linear-gradient(180deg, #5fbf8a 0%, #2f7a4f 100%); }
  .wx-bar .bar.火 { background: linear-gradient(180deg, #ef7878 0%, #a13838 100%); }
  .wx-bar .bar.土 { background: linear-gradient(180deg, #e5b77d 0%, #8a6438 100%); }
  .wx-bar .bar.金 { background: linear-gradient(180deg, #e0e0e8 0%, #909098 100%); }
  .wx-bar .bar.水 { background: linear-gradient(180deg, #5d99cc 0%, #2d557a 100%); }
  .wx-bar .label { color: var(--ivory); font-size: 14px; font-weight: 600; }
  .wx-bar .count { color: var(--text-dim); font-size: 12px; }

  .table { width: 100%; border-collapse: collapse; }
  .table th, .table td {
    padding: 10px 8px; border-bottom: 1px solid rgba(212,175,55,0.15);
    text-align: center; font-size: 14px;
  }
  .table th { color: var(--gold); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
  .table td { color: var(--text); }
  .table .gz { font-size: 18px; font-weight: 600; color: var(--ivory); }
  .table tbody tr:hover { background: rgba(212,175,55,0.05); }

  .scroll-x { overflow-x: auto; }

  footer { text-align: center; margin-top: 40px; color: var(--text-dim); font-size: 13px; }
  .error { color: var(--fire); background: rgba(214,84,84,0.1); border: 1px solid var(--fire); padding: 12px; border-radius: 8px; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>✦ <span data-i18n="title">八字命盤</span> <span class="deco">·</span> <span style="font-size:0.6em;color:var(--text-dim)">BaZi</span></h1>
    <div class="lang-switch" id="langSwitch">
      <button data-lang="tw" class="active">繁中</button>
      <button data-lang="cn">简中</button>
      <button data-lang="en">EN</button>
    </div>
  </header>

  <div class="intro">
    <p data-i18n="intro">八字以出生年月日時推算四柱，揭示先天命局與大運流年。輸入正確的出生時間，看見你的命盤。</p>
  </div>

  <div class="form-card">
    <div class="section-label" data-i18n="birthInfo">出生資訊</div>
    <div class="form-grid">
      <div class="field">
        <label data-i18n="calendarType">曆法</label>
        <div class="radio-row" data-group="cal">
          <label class="active" data-val="solar"><input type="radio" name="cal" value="solar" checked><span data-i18n="solar">公曆</span></label>
          <label data-val="lunar"><input type="radio" name="cal" value="lunar"><span data-i18n="lunar">農曆</span></label>
        </div>
      </div>
      <div class="field">
        <label data-i18n="gender">性別</label>
        <div class="radio-row" data-group="g">
          <label class="active" data-val="1"><input type="radio" name="g" value="1" checked><span data-i18n="male">男</span></label>
          <label data-val="0"><input type="radio" name="g" value="0"><span data-i18n="female">女</span></label>
        </div>
      </div>
    </div>
    <div class="form-grid">
      <div class="field"><label data-i18n="year">年</label><input id="y" type="number" min="1900" max="2100" value="1990"></div>
      <div class="field"><label data-i18n="month">月</label><input id="m" type="number" min="1" max="12" value="6"></div>
      <div class="field"><label data-i18n="day">日</label><input id="d" type="number" min="1" max="31" value="15"></div>
      <div class="field"><label data-i18n="hour">時（0-23）</label><input id="h" type="number" min="0" max="23" value="12"></div>
      <div class="field"><label data-i18n="minute">分</label><input id="mi" type="number" min="0" max="59" value="0"></div>
      <div class="field" id="leapField" style="display:none;">
        <label data-i18n="leapMonth">閏月</label>
        <div class="radio-row" data-group="leap">
          <label class="active" data-val="0"><input type="radio" name="leap" value="0" checked><span data-i18n="no">否</span></label>
          <label data-val="1"><input type="radio" name="leap" value="1"><span data-i18n="yes">是</span></label>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn" id="calcBtn" data-i18n="calcBtn">排盤</button>
      <button class="btn ghost" id="resetBtn" data-i18n="resetBtn">重來</button>
    </div>
    <div class="error" id="err" style="display:none;"></div>
  </div>

  <div class="result" id="result">
    <div class="summary" id="summary"></div>

    <div class="pillars" id="pillars"></div>

    <div class="panel">
      <div class="panel-title" data-i18n="wuxingStat">五行分布</div>
      <div class="wuxing-bars" id="wxBars"></div>
    </div>

    <div class="panel">
      <div class="panel-title" data-i18n="daYun">大運（10 年一運）</div>
      <div class="scroll-x">
        <table class="table" id="dyTable"></table>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title" data-i18n="liuNian">流年（當前大運內）</div>
      <div class="scroll-x">
        <table class="table" id="lnTable"></table>
      </div>
    </div>
  </div>

  <footer>
    <p data-i18n="footer">命盤反映先天能量結構，後天努力仍為關鍵。本工具僅供參考，不構成決策建議。</p>
  </footer>
</div>

<script>
const I18N = {
  tw: {
    title:'八字命盤', intro:'八字以出生年月日時推算四柱，揭示先天命局與大運流年。輸入正確的出生時間，看見你的命盤。',
    birthInfo:'出生資訊', calendarType:'曆法', solar:'公曆', lunar:'農曆',
    gender:'性別', male:'男', female:'女',
    year:'年', month:'月', day:'日', hour:'時（0-23）', minute:'分',
    leapMonth:'閏月', yes:'是', no:'否',
    calcBtn:'排盤', resetBtn:'重來',
    wuxingStat:'五行分布', daYun:'大運（10 年一運）', liuNian:'流年（當前大運內）',
    footer:'命盤反映先天能量結構，後天努力仍為關鍵。本工具僅供參考，不構成決策建議。',
    pillarYear:'年柱', pillarMonth:'月柱', pillarDay:'日柱', pillarHour:'時柱',
    pillarYearSub:'祖上 · 童年', pillarMonthSub:'父母 · 青年', pillarDaySub:'自身 · 配偶', pillarHourSub:'子女 · 晚年',
    shishen:'十神', nayin:'納音', tibet:'藏干', ganzhi:'干支',
    age:'歲', startYear:'起運年', dayMaster:'日主',
    summary:'<b>{name}</b>{gender}命，{solarStr}（農曆 {lunarStr}），日主為 <b>{dayMaster}</b>，五行屬 <b>{dayWx}</b>。',
    errInvalidDate:'日期不合法，請檢查。',
    errLib:'命理函式庫載入失敗，請檢查網路。',
    woman:'女', man:'男',
  },
  cn: {
    title:'八字命盘', intro:'八字以出生年月日时推算四柱，揭示先天命局与大运流年。输入正确的出生时间，看见你的命盘。',
    birthInfo:'出生信息', calendarType:'历法', solar:'公历', lunar:'农历',
    gender:'性别', male:'男', female:'女',
    year:'年', month:'月', day:'日', hour:'时（0-23）', minute:'分',
    leapMonth:'闰月', yes:'是', no:'否',
    calcBtn:'排盘', resetBtn:'重来',
    wuxingStat:'五行分布', daYun:'大运（10 年一运）', liuNian:'流年（当前大运内）',
    footer:'命盘反映先天能量结构，后天努力仍为关键。本工具仅供参考，不构成决策建议。',
    pillarYear:'年柱', pillarMonth:'月柱', pillarDay:'日柱', pillarHour:'时柱',
    pillarYearSub:'祖上 · 童年', pillarMonthSub:'父母 · 青年', pillarDaySub:'自身 · 配偶', pillarHourSub:'子女 · 晚年',
    shishen:'十神', nayin:'纳音', tibet:'藏干', ganzhi:'干支',
    age:'岁', startYear:'起运年', dayMaster:'日主',
    summary:'<b>{name}</b>{gender}命，{solarStr}（农历 {lunarStr}），日主为 <b>{dayMaster}</b>，五行属 <b>{dayWx}</b>。',
    errInvalidDate:'日期不合法，请检查。',
    errLib:'命理函式库载入失败，请检查网络。',
    woman:'女', man:'男',
  },
  en: {
    title:'BaZi Chart', intro:'BaZi derives four pillars from your birth year, month, day, and hour, revealing the innate energy map and life cycles. Enter your accurate birth time to see your chart.',
    birthInfo:'Birth Info', calendarType:'Calendar', solar:'Solar', lunar:'Lunar',
    gender:'Gender', male:'Male', female:'Female',
    year:'Year', month:'Month', day:'Day', hour:'Hour (0-23)', minute:'Minute',
    leapMonth:'Leap Month', yes:'Yes', no:'No',
    calcBtn:'Cast Chart', resetBtn:'Reset',
    wuxingStat:'Five Elements', daYun:'Major Cycles (10-yr)', liuNian:'Annual (Within Current Cycle)',
    footer:'The chart shows innate structure; lived effort still shapes the outcome. For reflection only.',
    pillarYear:'Year', pillarMonth:'Month', pillarDay:'Day', pillarHour:'Hour',
    pillarYearSub:'Ancestors · Childhood', pillarMonthSub:'Parents · Youth', pillarDaySub:'Self · Spouse', pillarHourSub:'Children · Late life',
    shishen:'Ten Gods', nayin:'NaYin', tibet:'Hidden Stems', ganzhi:'GanZhi',
    age:'age', startYear:'start year', dayMaster:'Day Master',
    summary:'<b>{name}</b>{gender}, born {solarStr} (lunar {lunarStr}). Day Master: <b>{dayMaster}</b> ({dayWx}).',
    errInvalidDate:'Invalid date. Please check inputs.',
    errLib:'Calendar library failed to load. Check connection.',
    woman:'F', man:'M',
  },
};

const GAN_WX = { '甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水' };
const ZHI_WX = { '子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水' };
const WX_ORDER = ['木','火','土','金','水'];

const WX_NAME = {
  '木': { tw:'木', cn:'木', en:'Wood' },
  '火': { tw:'火', cn:'火', en:'Fire' },
  '土': { tw:'土', cn:'土', en:'Earth' },
  '金': { tw:'金', cn:'金', en:'Metal' },
  '水': { tw:'水', cn:'水', en:'Water' },
};

let state = { lang: 'tw', last: null };

function t(k) { return I18N[state.lang][k] || k; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (I18N[state.lang][k] != null) el.textContent = I18N[state.lang][k];
  });
  document.documentElement.lang = ({tw:'zh-TW',cn:'zh-CN',en:'en'})[state.lang];
  if (state.last) render(state.last);
}

document.getElementById('langSwitch').addEventListener('click', (e) => {
  if (e.target.tagName !== 'BUTTON') return;
  state.lang = e.target.dataset.lang;
  document.querySelectorAll('#langSwitch button').forEach(b => b.classList.toggle('active', b.dataset.lang === state.lang));
  applyI18n();
});

document.querySelectorAll('.radio-row').forEach(row => {
  row.addEventListener('click', (e) => {
    const label = e.target.closest('label');
    if (!label) return;
    row.querySelectorAll('label').forEach(l => l.classList.remove('active'));
    label.classList.add('active');
    label.querySelector('input').checked = true;
    if (row.dataset.group === 'cal') {
      document.getElementById('leapField').style.display = label.dataset.val === 'lunar' ? 'flex' : 'none';
    }
  });
});

function getInput() {
  return {
    cal: document.querySelector('input[name=cal]:checked').value,
    g: +document.querySelector('input[name=g]:checked').value,
    y: +document.getElementById('y').value,
    m: +document.getElementById('m').value,
    d: +document.getElementById('d').value,
    h: +document.getElementById('h').value,
    mi: +document.getElementById('mi').value,
    leap: +(document.querySelector('input[name=leap]:checked')?.value || 0),
  };
}

function showError(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = 'block';
}
function clearError() { document.getElementById('err').style.display = 'none'; }

function calculate() {
  clearError();
  if (typeof Solar === 'undefined' || typeof Lunar === 'undefined') {
    showError(t('errLib')); return;
  }
  const i = getInput();
  let solar, lunar;
  try {
    if (i.cal === 'solar') {
      solar = Solar.fromYmdHms(i.y, i.m, i.d, i.h, i.mi, 0);
      lunar = solar.getLunar();
    } else {
      const month = i.leap ? -i.m : i.m;
      lunar = Lunar.fromYmdHms(i.y, month, i.d, i.h, i.mi, 0);
      solar = lunar.getSolar();
    }
  } catch (e) { showError(t('errInvalidDate') + ' ' + e.message); return; }

  const ec = lunar.getEightChar();
  const yun = ec.getYun(i.g);
  const daYun = yun.getDaYun();

  const ganList = [ec.getYearGan(), ec.getMonthGan(), ec.getDayGan(), ec.getTimeGan()];
  const zhiList = [ec.getYearZhi(), ec.getMonthZhi(), ec.getDayZhi(), ec.getTimeZhi()];
  const shishenGan = [ec.getYearShiShenGan(), ec.getMonthShiShenGan(), null, ec.getTimeShiShenGan()];
  const shishenZhi = [ec.getYearShiShenZhi(), ec.getMonthShiShenZhi(), ec.getDayShiShenZhi(), ec.getTimeShiShenZhi()];
  const nayin = [ec.getYearNaYin(), ec.getMonthNaYin(), ec.getDayNaYin(), ec.getTimeNaYin()];
  const hideGan = [ec.getYearHideGan(), ec.getMonthHideGan(), ec.getDayHideGan(), ec.getTimeHideGan()];

  const wxCount = { '木':0,'火':0,'土':0,'金':0,'水':0 };
  ganList.forEach(g => { if (GAN_WX[g]) wxCount[GAN_WX[g]]++; });
  zhiList.forEach(z => { if (ZHI_WX[z]) wxCount[ZHI_WX[z]]++; });

  state.last = {
    input: i, solar, lunar, ec, yun, daYun,
    ganList, zhiList, shishenGan, shishenZhi, nayin, hideGan, wxCount,
    dayMaster: ec.getDayGan(), dayWx: GAN_WX[ec.getDayGan()],
  };
  render(state.last);
}

function render(R) {
  document.getElementById('result').classList.add('show');

  const lang = state.lang;
  const i = R.input;
  const genderStr = i.g === 1 ? t('man') : t('woman');
  const solarStr = `${R.solar.getYear()}-${String(R.solar.getMonth()).padStart(2,'0')}-${String(R.solar.getDay()).padStart(2,'0')} ${String(R.solar.getHour()).padStart(2,'0')}:${String(R.solar.getMinute()).padStart(2,'0')}`;
  const lunarStr = `${R.lunar.getYearInChinese()}年${R.lunar.getMonthInChinese()}月${R.lunar.getDayInChinese()}`;

  document.getElementById('summary').innerHTML = t('summary')
    .replace('{name}', '').replace('{gender}', genderStr)
    .replace('{solarStr}', solarStr).replace('{lunarStr}', lunarStr)
    .replace('{dayMaster}', R.dayMaster).replace('{dayWx}', WX_NAME[R.dayWx][lang]);

  const pTitles = ['pillarYear','pillarMonth','pillarDay','pillarHour'];
  const pSubs = ['pillarYearSub','pillarMonthSub','pillarDaySub','pillarHourSub'];
  const pillarsEl = document.getElementById('pillars');
  pillarsEl.innerHTML = '';
  for (let k = 0; k < 4; k++) {
    const gan = R.ganList[k], zhi = R.zhiList[k];
    const ganWx = GAN_WX[gan] || '', zhiWx = ZHI_WX[zhi] || '';
    const ssg = R.shishenGan[k] === null ? t('dayMaster') : R.shishenGan[k];
    const ssz = Array.isArray(R.shishenZhi[k]) ? R.shishenZhi[k].join('·') : R.shishenZhi[k];
    const hg = Array.isArray(R.hideGan[k]) ? R.hideGan[k].join('·') : R.hideGan[k];
    pillarsEl.insertAdjacentHTML('beforeend', `
      <div class="pillar">
        <div class="pillar-title">${t(pTitles[k])}</div>
        <div style="color:var(--text-dim);font-size:11px;margin-bottom:8px;">${t(pSubs[k])}</div>
        <div class="pillar-chars">
          <div class="gan wx-${ganWx}">${gan}</div>
          <div class="zhi wx-${zhiWx}">${zhi}</div>
        </div>
        <div class="pillar-meta">
          <div><span class="label">${t('shishen')}</span><span class="shishen">${ssg}</span></div>
          <div><span class="label">${t('tibet')}</span>${hg}</div>
          <div><span class="label">${t('nayin')}</span>${R.nayin[k]}</div>
        </div>
      </div>`);
  }

  const wxBarsEl = document.getElementById('wxBars');
  wxBarsEl.innerHTML = '';
  const maxN = Math.max(1, ...Object.values(R.wxCount));
  WX_ORDER.forEach(wx => {
    const n = R.wxCount[wx];
    const h = Math.round((n / maxN) * 100);
    wxBarsEl.insertAdjacentHTML('beforeend', `
      <div class="wx-bar">
        <div class="bar-wrap"><div class="bar ${wx}" style="height:${h}%"></div></div>
        <div class="label wx-${wx}">${WX_NAME[wx][lang]}</div>
        <div class="count">${n}</div>
      </div>`);
  });

  const dyEl = document.getElementById('dyTable');
  dyEl.innerHTML = `
    <thead><tr>
      <th>#</th><th>${t('age')}</th><th>${t('startYear')}</th><th>${t('ganzhi')}</th><th>${t('nayin')}</th>
    </tr></thead><tbody></tbody>`;
  const dyBody = dyEl.querySelector('tbody');
  R.daYun.forEach((dy, idx) => {
    if (idx === 0 && idx >= R.daYun.length) return;
    if (idx === 0) {
      dyBody.insertAdjacentHTML('beforeend', `<tr style="opacity:0.6"><td>0</td><td>0-${dy.getStartAge()-1}</td><td>${R.solar.getYear()}</td><td colspan="2" style="color:var(--text-dim);font-style:italic">${lang==='en'?'(pre-cycle)':'起運前'}</td></tr>`);
      return;
    }
    const gz = dy.getGanZhi();
    const gan = gz[0], zhi = gz[1];
    const gWx = GAN_WX[gan] || '', zWx = ZHI_WX[zhi] || '';
    dyBody.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${idx}</td>
        <td>${dy.getStartAge()}-${dy.getEndAge()}</td>
        <td>${dy.getStartYear()}</td>
        <td class="gz"><span class="wx-${gWx}">${gan}</span><span class="wx-${zWx}">${zhi}</span></td>
        <td>—</td>
      </tr>`);
  });

  const lnEl = document.getElementById('lnTable');
  lnEl.innerHTML = `
    <thead><tr>
      <th>${t('year')}</th><th>${t('age')}</th><th>${t('ganzhi')}</th><th>${t('nayin')}</th>
    </tr></thead><tbody></tbody>`;
  const lnBody = lnEl.querySelector('tbody');
  const currentYear = new Date().getFullYear();
  let liuNianList = [];
  for (const dy of R.daYun) {
    if (currentYear >= dy.getStartYear() && currentYear <= dy.getEndYear()) {
      liuNianList = dy.getLiuNian();
      break;
    }
  }
  if (liuNianList.length === 0 && R.daYun[1]) liuNianList = R.daYun[1].getLiuNian();
  liuNianList.forEach(ln => {
    const gz = ln.getGanZhi();
    const gan = gz[0], zhi = gz[1];
    const gWx = GAN_WX[gan] || '', zWx = ZHI_WX[zhi] || '';
    const yr = ln.getYear();
    const isNow = yr === currentYear;
    lnBody.insertAdjacentHTML('beforeend', `
      <tr style="${isNow ? 'background:rgba(212,175,55,0.12);' : ''}">
        <td>${yr}${isNow ? ' ←' : ''}</td>
        <td>${ln.getAge()}</td>
        <td class="gz"><span class="wx-${gWx}">${gan}</span><span class="wx-${zWx}">${zhi}</span></td>
        <td>—</td>
      </tr>`);
  });
}

function reset() {
  state.last = null;
  document.getElementById('result').classList.remove('show');
  clearError();
}

document.getElementById('calcBtn').addEventListener('click', calculate);
document.getElementById('resetBtn').addEventListener('click', reset);

applyI18n();
</script>
</body>
</html>
